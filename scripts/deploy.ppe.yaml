# yaml-language-server: $schema=../packages/cli/src/config/deploy.schema.json
# PPE live-deploy config (real on-disk file, scp'd to the standard data root).
#
# Environment-specific by design, but it must not commit machine-local paths.
# The deploy environment is responsible for exposing `traex` on PATH.
#
# LLM is driven through the OSS `@understand-anyway/provider-trae-cli-v2`
# package talking directly to `traex exec` (no shim): `modelArg: -m` injects
# the provider-profile model onto the command line, and traex writes the final
# answer to stdout.

version: 1

deploy:
  host: "0.0.0.0"
  port: 18690
  outputLanguage: "zh"

gateway:
  retain: 2

llmProfiles:
  traex:
    package: "@understand-anyway/provider-trae-cli-v2"
    config:
      command: "traex"
      args:
        - "exec"
        - "--skip-git-repo-check"
        - "--dangerously-bypass-approvals-and-sandbox"
        - "--ephemeral"
      modelArg: "-m"
      model: "Qwen3.6-Plus"
      modelCandidates:
        - "Qwen3.6-Plus"
      promptMode: "arg"
  traecli:
    package: "@understand-anyway/provider-trae-cli-v1"
    config:
      command: "traecli"
      model: "Qwen3.6-Plus"
      promptMode: "arg"

record:
  providers: ["local"]

deployProfiles:
  ppe:
    deploy:
      host: "0.0.0.0"
      port: 18690
      outputLanguage: "zh"
    gateway:
      retain: 2
    build:
      mode: "full"
      excludeTests: true
      outputLanguage: "zh"
      llmAnalysis: true
      llmRequired: false
      mappers: 1
      llmConcurrencyPerMapper: 1
      llmQpmLimit: 2
  prod:
    deploy:
      host: "0.0.0.0"
      port: 18666
      outputLanguage: "zh"
    gateway:
      retain: 5
    build:
      mode: "incremental"
      excludeTests: true
      outputLanguage: "zh"
      llmAnalysis: true
      llmRequired: true
      mappers: 4
      llmConcurrencyPerMapper: 4
      llmQpmLimit: 30
